# All services are pinned to linux/amd64 so the generated reflection caches
# (tests/cache/Reflection*.json) are reproducible regardless of host CPU.
# Reflection reads real runtime values that depend on the CPU ABI — e.g. CHAR_MAX
# is 255 on arm64 (unsigned char) but 127 on amd64 (signed char). amd64 matches CI
# (ubuntu-latest) and the committed baseline. On arm64 hosts (Apple Silicon) these
# containers run under emulation, which is slower but keeps the output identical.
services:
  php_under_test:
    build:
      context: tests/DockerImages/${PHP_VERSION}
      # Pin the base image to the exact patch recorded in tests/cache/php-versions.json so the
      # generated reflection caches are reproducible. run-all-reflection-parsers.sh exports PHP_PATCH
      # from the manifest; the fallback to the minor line keeps manual builds working when it is unset.
      args:
        PHP_PATCH: ${PHP_PATCH:-${PHP_VERSION}}
    platform: linux/amd64
    volumes:
      - .:/opt/project/phpstorm-stubs
  test_runner:
    build: tests/DockerImages/testRunner
    platform: linux/amd64
    volumes:
      - .:/opt/project/phpstorm-stubs
  pecl_extensions:
    build: tests/DockerImages/peclExtensions
    platform: linux/amd64
    volumes:
      - .:/opt/project/phpstorm-stubs
